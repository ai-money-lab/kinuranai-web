*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--txt);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden}

.container{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 20px 100px}

/* Today Banner */

.today-banner .tb-label{font-size:.65rem;letter-spacing:.25em;color:var(--gold);margin-bottom:6px}
.today-banner .tb-kin{font-family:'Noto Serif JP',serif;font-size:1.1rem;font-weight:700;color:var(--txt);margin-bottom:4px}

/* Header */

.header h1{font-family:'Noto Serif JP',serif;font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;line-height:1.35;background:linear-gradient(135deg,var(--gold),#FFF9C4 40%,#C8B0FF 70%,var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;margin-bottom:12px}

.input-card{background:var(--card);backdrop-filter:blur(20px);border:1px solid rgba(255,215,0,.2);border-radius:24px;padding:32px 24px;margin-bottom:24px;box-shadow:0 4px 40px rgba(0,0,0,.4)}

.compat-result{display:none}.compat-result.visible{display:block;animation:fadeUp .5s ease}

.rel-card{background:linear-gradient(135deg,rgba(255,215,0,.1),rgba(255,215,0,.04));border:1px solid rgba(255,215,0,.3);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center}

<script>
// ═══════════════════════════════════════════
// Starfield
// ═══════════════════════════════════════════
(function(){
  const c=document.getElementById('starfield'),x=c.getContext('2d');let W,H,s=[];
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  function init(){s=[];const n=Math.floor(W*H/5000);for(let i=0;i<n;i++)s.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.2,sp:Math.random()*.008+.003,ph:Math.random()*Math.PI*2,g:Math.random()<.12})}
  function draw(t){x.clearRect(0,0,W,H);s.forEach(p=>{const a=.15+.85*(.5+.5*Math.sin(p.ph+t*p.sp));x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fillStyle=p.g?`rgba(255,215,0,${a*.9})`:`rgba(200,190,255,${a*.7})`;x.fill()});requestAnimationFrame(draw)}
  addEventListener('resize',()=>{resize();init()});resize();init();requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════
// KIN Calculation
// ═══════════════════════════════════════════
// Dreamspell標準: 2013-07-26 (Galactic Seed) = KIN 1
// 単純な日数差 mod 260 で計算（閏日を引かない）
const ANCHOR={y:2013,m:7,d:26},ANCHOR_KIN=1;
function daysBetween(a,b){return Math.round((b-a)/864e5)}
function calcKin(y,m,d){const a=new Date(ANCHOR.y,ANCHOR.m-1,ANCHOR.d),t=new Date(y,m-1,d),r=daysBetween(a,t);return((ANCHOR_KIN-1+r)%260+260)%260+1}
function getSeal(k){const n=k%20;return n===0?20:n}
function getTone(k){const n=k%13;return n===0?13:n}
function getWS(k){return Math.ceil(k/13)}

// ═══════════════════════════════════════════
// Data: 20 Seals
// ═══════════════════════════════════════════

function calcScore(rels,t1,t2,s1,s2){
  let score=55;
  rels.forEach(r=>{
    if(r.id==='same')score+=20;
    if(r.id==='analog')score+=18;
    if(r.id==='mystic')score+=22;
    if(r.id==='guide')score+=15;
    if(r.id==='anti')score+=10;
    if(r.id==='mirror')score+=18;
    if(r.id==='absAnti')score+=8;

  if(t1===t2)score+=5;

  const colMap={red:0,white:1,blue:2,yellow:3};

  if(cd===0)score+=5;
  return Math.min(score,99);

      </div>

      <!-- Score Bar -->
      <div style="text-align:center;margin:20px 0 8px">
        <div class="sec-title">相性スコア</div>
        <div style="font-family:'Noto Serif JP',serif;font-size:clamp(2.5rem,10vw,3.5rem);font-weight:900;color:var(--gold);line-height:1">${score}<span style="font-size:.5em;color:var(--sub)"> / 100</span></div>
        <div style="background:var(--panel);border-radius:8px;height:12px;margin:12px 20px;overflow:hidden"><div style="height:100%;width:${score}%;background:linear-gradient(90deg,var(--gold),${score>70?'#4FC3F7':'#FFD740'});border-radius:8px;transition:width 1s ease"></div></div>
        <div style="font-size:.78rem;color:var(--sub)">${score>=80?'奇跡的な相性。宇宙が引き合わせた特別な縁。':score>=60?'強い絆で結ばれた好相性。お互いを高め合える関係。':score>=45?'バランスの取れた関係。違いが成長の源になる。':'挑戦的だが、最も深い学びをもたらす組み合わせ。'}</div>
      </div>

      <div class="divider"><div class="divider-line"></div><div class="divider-text">紋章の関係性</div><div class="divider-line"></div></div>

      ${rels.length?rels.map(r=>`<div class="rel-card"><div class="rel-type">${r.name}</div><div class="rel-feel">${r.feel}</div><div class="rel-desc">${r.desc}</div></div>`).join('')
        :`<div class="rel-card"><div class="rel-type">自由な関係</div><div class="rel-feel">型にはまらないふたりだけの絆</div><div class="rel-desc">特定の紋章関係に縛られない自由な組み合わせ。既存の型にはまらないからこそ、ふたりだけのオリジナルな関係を築ける可能性を秘めています。</div></div>`}

      <!-- Element Compatibility -->
      <div class="sec b-yellow revealed"><div class="sec-title">エレメントの相性 — ${COLOR_MAP[seal1.color]} × ${COLOR_MAP[seal2.color]}</div><div class="sec-body">${elemDesc}</div></div>

      <!-- Tone Compatibility -->
      <div class="sec b-blue revealed"><div class="sec-title">音の相性 — ${tone1.ja} × ${tone2.ja}（${toneC.label}）</div><div class="sec-body">${toneC.desc}</div></div>

      <!-- Both Profiles -->
      <div class="divider"><div class="divider-line"></div><div class="divider-text">ふたりの本質比較</div><div class="divider-line"></div></div>
      <div class="sec b-${seal1.color} revealed"><div class="sec-title">${seal1.ja}（あなた）の本質</div><div class="sec-body">${seal1.p}</div></div>
      <div class="sec b-${seal2.color} revealed"><div class="sec-title">${seal2.ja}（お相手）の本質</div><div class="sec-body">${seal2.p}</div></div>

      <!-- Love Comparison -->
      <div class="divider"><div class="divider-line"></div><div class="divider-text">恋愛傾向の比較</div><div class="divider-line"></div></div>
      <div class="sec b-${seal1.color} revealed"><div class="sec-title">${seal1.ja}の恋愛</div><div class="sec-body">${seal1.love}</div></div>
      <div class="sec b-${seal2.color} revealed"><div class="sec-title">${seal2.ja}の恋愛</div><div class="sec-body">${seal2.love}</div></div>

      <!-- Advice -->
      <div class="today-block"><div class="today-title">ふたりへのアドバイス</div><div class="today-body">${advice}</div></div>


      <div class="share-area"><button class="btn-share" onclick="openShare('compat')">シェアカードを保存</button></div>

      <div class="cta-block">
        <div class="cta-title">毎日のKINエネルギーを受け取る</div>
        <div class="cta-desc">ふたりの相性をさらに深く知るために<br>毎日のKIN情報をチェック</div>
        <a class="btn-ig" href="https://www.instagram.com/kinuranai/" target="_blank" rel="noopener">@kinuranai をフォロー</a>
      </div>
    </div>
  `;
  res.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════
// Today's KIN
// ═══════════════════════════════════════════
function getDailyMsg(userSeal){
  const now=new Date(),todayKin=calcKin(now.getFullYear(),now.getMonth()+1,now.getDate());
  const todaySeal=getSeal(todayKin);
  // Combine user seal message with today's energy
  const base=SEALS[userSeal].msg;
  if(userSeal===todaySeal)return base+' 今日はあなたの紋章と同じエネルギーの日。力が倍増する特別な一日。';
  return base;
}
function initToday(){
  const now=new Date(),kin=calcKin(now.getFullYear(),now.getMonth()+1,now.getDate());
  const seal=getSeal(kin),tone=getTone(kin),s=SEALS[seal],t=TONES[tone];
  document.getElementById('tb-kin').textContent=`KIN ${kin}  ${s.ja}  ${t.ja}`;
  document.getElementById('tb-msg').textContent=s.msg;
}

// ═══════════════════════════════════════════
// Share Card (Canvas)
// ═══════════════════════════════════════════
function openShare(type){
  const canvas=document.getElementById('share-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=1080;canvas.height=1920;
  // Background
  const bg=ctx.createLinearGradient(0,0,540,1920);
  bg.addColorStop(0,'#0A0A2E');bg.addColorStop(.5,'#140A3E');bg.addColorStop(1,'#0D0A35');
  ctx.fillStyle=bg;ctx.fillRect(0,0,1080,1920);
  // Stars
  for(let i=0;i<200;i++){ctx.beginPath();const x=Math.random()*1080,y=Math.random()*1920,r=Math.random()*2+.5;ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=Math.random()<.1?`rgba(255,215,0,${Math.random()*.6+.2})`:`rgba(200,190,255,${Math.random()*.4+.1})`;ctx.fill()}

  if(type==='personal'&&lastPersonalData){
    const d=lastPersonalData,s=d.s;
    const col={red:'#F05050',white:'#D8D0F0',blue:'#4FC3F7',yellow:'#FFD740'}[d.c];
    // Gold circle
    ctx.beginPath();ctx.arc(540,520,200,0,Math.PI*2);ctx.strokeStyle='rgba(255,215,0,.4)';ctx.lineWidth=3;ctx.stroke();
    ctx.beginPath();ctx.arc(540,520,190,0,Math.PI*2);ctx.strokeStyle='rgba(255,215,0,.15)';ctx.lineWidth=1;ctx.stroke();
    // Badge
    ctx.fillStyle='rgba(255,215,0,.15)';roundRect(ctx,380,200,320,40,20);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.font='700 22px "Noto Sans JP"';ctx.textAlign='center';ctx.fillText('MAYA DREAMSPELL',540,228);
    // KIN Number
    ctx.fillStyle=col;ctx.font='900 180px "Noto Serif JP"';ctx.textAlign='center';ctx.fillText(d.kin,540,580);
    // Seal name
    ctx.fillStyle='#EDE8F8';ctx.font='700 52px "Noto Serif JP"';ctx.fillText(s.ja,540,700);
    ctx.fillStyle='#9B96C0';ctx.font='400 28px "Noto Sans JP"';ctx.fillText(SEAL_EN[d.seal],540,750);
    // Keywords
    ctx.fillStyle=col;ctx.font='700 30px "Noto Sans JP"';ctx.fillText(s.kw.join('  ・  '),540,820);
    // Celebrity
    const celebs=celebData.filter(cb=>cb.seal===d.seal).slice(0,2);
    if(celebs.length){
      ctx.fillStyle='rgba(255,215,0,.1)';roundRect(ctx,120,880,840,100,16);ctx.fill();
      ctx.strokeStyle='rgba(255,215,0,.3)';ctx.lineWidth=1;roundRect(ctx,120,880,840,100,16);ctx.stroke();
      ctx.fillStyle='#FFD700';ctx.font='400 24px "Noto Sans JP"';ctx.fillText('同じ紋章の有名人',540,918);
      ctx.fillStyle='#EDE8F8';ctx.font='700 32px "Noto Sans JP"';ctx.fillText(celebs.map(c=>c.name).join('  /  '),540,960);
    }
    // Dynamic layout: measure text first, then draw boxes
    const padX=130,boxX=80,boxW=920,txtW=boxW-100,lineH=36,titleH=40,boxPad=30;
    ctx.font='400 26px "Noto Sans JP"';
    const pLines=wrapLines(ctx,s.p,txtW);
    const mLines=wrapLines(ctx,s.m,txtW);
    const pBoxH=titleH+pLines.length*lineH+boxPad*2;
    const mBoxH=titleH+mLines.length*lineH+boxPad*2;
    let cy=1020;
    // Personality box
    ctx.fillStyle='rgba(15,14,50,.9)';roundRect(ctx,boxX,cy,boxW,pBoxH,16);ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,.15)';ctx.lineWidth=1;roundRect(ctx,boxX,cy,boxW,pBoxH,16);ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.font='400 22px "Noto Sans JP"';ctx.textAlign='left';ctx.fillText('あなたの本質',padX,cy+boxPad+16);
    ctx.fillStyle='#EDE8F8';ctx.font='400 26px "Noto Sans JP"';drawWrapped(ctx,s.p,padX,cy+boxPad+titleH+10,txtW,lineH);
    cy+=pBoxH+16;
    // Tone
    ctx.textAlign='center';ctx.fillStyle='#9B96C0';ctx.font='400 26px "Noto Sans JP"';ctx.fillText(`${d.t.ja} — ${d.t.role}`,540,cy+20);
    cy+=50;
    // Mission box
    ctx.fillStyle='rgba(255,215,0,.08)';roundRect(ctx,boxX,cy,boxW,mBoxH,16);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.font='400 22px "Noto Sans JP"';ctx.textAlign='left';ctx.fillText('あなたの使命',padX,cy+boxPad+16);
    ctx.fillStyle='#EDE8F8';ctx.font='400 26px "Noto Sans JP"';drawWrapped(ctx,s.m,padX,cy+boxPad+titleH+10,txtW,lineH);
    cy+=mBoxH+40;
    // Branding — always at bottom
    const brandY=Math.max(cy+20,1780);
    ctx.textAlign='center';ctx.fillStyle='#FFD700';ctx.font='900 36px "Noto Sans JP"';ctx.fillText('@kinuranai',540,brandY);
    ctx.fillStyle='#9B96C0';ctx.font='400 24px "Noto Sans JP"';ctx.fillText('無料KIN診断 → kinuranai.vercel.app',540,brandY+45);
  } else if(type==='compat'&&lastCompatData){
    const d=lastCompatData;
    const c1={red:'#F05050',white:'#D8D0F0',blue:'#4FC3F7',yellow:'#FFD740'}[d.seal1.color];
    const c2={red:'#F05050',white:'#D8D0F0',blue:'#4FC3F7',yellow:'#FFD740'}[d.seal2.color];
    // Title
    ctx.fillStyle='#FFD700';ctx.font='700 28px "Noto Sans JP"';ctx.textAlign='center';ctx.fillText('MAYA DREAMSPELL 相性診断',540,200);
    // Two KINs
    ctx.fillStyle=c1;ctx.font='900 140px "Noto Serif JP"';ctx.fillText(d.k1,300,480);
    ctx.fillStyle='#FFD700';ctx.font='700 60px "Noto Serif JP"';ctx.fillText('×',540,440);
    ctx.fillStyle=c2;ctx.font='900 140px "Noto Serif JP"';ctx.fillText(d.k2,780,480);
    ctx.fillStyle='#EDE8F8';ctx.font='700 36px "Noto Serif JP"';ctx.fillText(d.seal1.ja,300,540);ctx.fillText(d.seal2.ja,780,540);
    // Relationships
    let ry=680;
    if(d.rels.length){
      d.rels.forEach(r=>{
        ctx.fillStyle='rgba(255,215,0,.1)';roundRect(ctx,100,ry-50,880,130,16);ctx.fill();
        ctx.strokeStyle='rgba(255,215,0,.3)';ctx.lineWidth=1;roundRect(ctx,100,ry-50,880,130,16);ctx.stroke();
        ctx.fillStyle='#FFD700';ctx.font='700 36px "Noto Serif JP"';ctx.fillText(r.name,540,ry);
        ctx.fillStyle='#EDE8F8';ctx.font='400 28px "Noto Sans JP"';ctx.fillText(r.feel,540,ry+45);
        ry+=170;
      });
    } else {
      ctx.fillStyle='#9B96C0';ctx.font='400 30px "Noto Sans JP"';ctx.fillText('ふたりだけの自由な絆',540,700);
    }
    // Branding
    ctx.fillStyle='#FFD700';ctx.font='900 36px "Noto Sans JP"';ctx.fillText('@kinuranai',540,1800);
    ctx.fillStyle='#9B96C0';ctx.font='400 24px "Noto Sans JP"';ctx.fillText('無料KIN診断 → kinuranai.vercel.app',540,1845);
  }
  document.getElementById('share-modal').classList.add('open');
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}
function wrapLines(ctx,text,maxW){const chars=text.split('');const lines=[];let line='';for(let i=0;i<chars.length;i++){const test=line+chars[i];if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=chars[i]}else{line=test}}if(line)lines.push(line);return lines}
function drawWrapped(ctx,text,x,y,maxW,lineH){const lines=wrapLines(ctx,text,maxW);lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));return lines.length}
function downloadCard(){
  const c=document.getElementById('share-canvas'),a=document.createElement('a');
  a.download='kinuranai_share.png';a.href=c.toDataURL('image/png');a.click();
}
function closeModal(e){if(!e||e.target.classList.contains('share-modal'))document.getElementById('share-modal').classList.remove('open')}

initSelects('p',1990,7,5);
initSelects('c1',1990,7,5);
initSelects('c2',1992,3,15);
initToday();
</script>
