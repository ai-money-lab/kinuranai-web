<script>
// =====================================================================
// Maya Calendar KIN Calculator (JS port of maya_kin_calculator.py)
// Anchor: 1972/3/4 = KIN 135  |  Dreamspell - Feb29 does NOT advance KIN
// =====================================================================

const ANCHOR = { year: 1972, month: 3, day: 4 };
const ANCHOR_KIN = 135;

function isLeapYear(y) {
  return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
}

function daysBetween(d1, d2) {
  // Returns d2 - d1 in days (can be negative)
  return Math.round((d2 - d1) / 86400000);
}

function countLeapDaysBetween(d1, d2) {
  // Count Feb 29 leap days strictly: d1 < leap_day <= d2
  if (d2 <= d1) return 0;
  const start = d1 < d2 ? d1 : d2;
  const end   = d1 < d2 ? d2 : d1;
  let count = 0;
  for (let y = start.getFullYear(); y <= end.getFullYear(); y++) {
    if (!isLeapYear(y)) continue;
    const leapDay = new Date(y, 1, 29); // Feb 29
    if (leapDay > start && leapDay <= end) count++;
  }
  return count;
}

function calculateKin(year, month, day) {
  const anchor = new Date(ANCHOR.year, ANCHOR.month - 1, ANCHOR.day);
  const target = new Date(year, month - 1, day);

  const rawDelta = daysBetween(anchor, target);
  let leapOffset;
  if (rawDelta >= 0) {
    leapOffset = countLeapDaysBetween(anchor, target);
  } else {
    leapOffset = -countLeapDaysBetween(target, anchor);
  }

  const adjusted = rawDelta - leapOffset;
  const kin = ((ANCHOR_KIN - 1 + adjusted) % 260 + 260) % 260 + 1;
  return kin;
}

function getEmblemNumber(kin) {
  const n = kin % 20;
  return n === 0 ? 20 : n;
}

function getToneNumber(kin) {
  const n = kin % 13;
  return n === 0 ? 13 : n;
}

// =====================================================================
// 紋章データ (20種)
// =====================================================================

  2:  { ja: "白い風",           color: "white",  keywords: ["感性", "共感", "メッセンジャー"],
        desc: "宇宙からのメッセージを受け取り、言葉や音楽で届ける使命を持つ。\n鋭い感性と共感力で、見えない世界と現実を繋ぐ架け橋になる。\n表現することで世界に光をもたらす、感性豊かな紋章。" },

  3:  { ja: "青い夜",           color: "blue",   keywords: ["夢", "目標", "直感"],
        desc: "豊かさと夢が結びついた、直感と想像力に満ちた存在。\n内側に広大な宇宙を持ち、ありありとした夢を現実化する力がある。\n眠れる才能が花開く時、世界を変えるビジョンが生まれる紋章。" },

  4:  { ja: "黄色い種",         color: "yellow", keywords: ["探求", "学習", "開花"],
        desc: "知識と知恵を集め、最高の花を咲かせるための旅を続ける存在。\n好奇心旺盛で探求心が強く、あらゆる場所から学びを得る才能がある。\n蒔いた種が大きく実る時、周囲に豊かさをもたらす紋章。" },

  5:  { ja: "赤い蛇",           color: "red",    keywords: ["情熱", "努力", "本能"],
        desc: "生命力と情熱が全身にみなぎる、本能的な強さを持つ存在。\nひとつのことに集中するフォーカス力が並外れており、困難を乗り越える意志がある。\n脱皮を繰り返しながら進化し続ける、変容の紋章。" },

// =====================================================================
// セレクトボックス初期化
// =====================================================================
function initSelects() {
  const selYear  = document.getElementById('sel-year');
  const selMonth = document.getElementById('sel-month');
  const selDay   = document.getElementById('sel-day');

  // 年: 1930〜2010
  for (let y = 2010; y >= 1930; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年';
    selYear.appendChild(opt);
  }
  // デフォルト1990
  selYear.value = 1990;

  // 月
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m + '月';
    selMonth.appendChild(opt);
  }
  selMonth.value = 7;

  // 日
  for (let d = 1; d <= 31; d++) {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d + '日';
    selDay.appendChild(opt);
  }
  selDay.value = 5;
}

// =====================================================================
// 診断実行
// =====================================================================
function diagnose() {
  const year  = parseInt(document.getElementById('sel-year').value);
  const month = parseInt(document.getElementById('sel-month').value);
  const day   = parseInt(document.getElementById('sel-day').value);

  // 日付バリデーション
  const errEl = document.getElementById('error-msg');
  try {
    const testDate = new Date(year, month - 1, day);
    if (
      testDate.getFullYear() !== year ||
      testDate.getMonth() + 1 !== month ||
      testDate.getDate() !== day
    ) {
      throw new Error('invalid');
    }
  } catch(e) {
    errEl.classList.add('visible');
    return;
  }
  errEl.classList.remove('visible');

  const kin = calculateKin(year, month, day);
  const emblemNum = getEmblemNumber(kin);
  const toneNum   = getToneNumber(kin);
  const emblem    = EMBLEMS[emblemNum];
  const tone      = TONES[toneNum];
  const color     = emblem.color;

  // 結果カードのクラスをリセット
  const card = document.getElementById('result-card');
  card.className = 'result-card visible color-' + color;

  // KIN番号
  const kinEl = document.getElementById('kin-number');
  kinEl.textContent = kin;
  kinEl.className = 'kin-number glow-' + color;

  // 紋章
  const emblemNameEl = document.getElementById('emblem-name');
  emblemNameEl.textContent = emblem.ja;
  emblemNameEl.className = 'badge-value text-' + color;

  document.getElementById('emblem-keyword').textContent = emblem.keywords.join('・');

  // 音
  const toneNameEl = document.getElementById('tone-name');
  toneNameEl.textContent = tone.ja;
  toneNameEl.className = 'badge-value text-' + color;
  document.getElementById('tone-keyword').textContent = tone.keyword;

  // キーワードタグ
  const kwRow = document.getElementById('keyword-row');
  kwRow.innerHTML = '';
  emblem.keywords.forEach(kw => {
    const tag = document.createElement('span');
    tag.className = 'keyword-tag tag-' + color;
    tag.textContent = kw;
    kwRow.appendChild(tag);
  });

  // 説明文
  const descBox  = document.getElementById('desc-box');
  descBox.className = 'desc-box border-' + color;
  document.getElementById('desc-text').innerHTML =
    emblem.desc.replace(/\n/g, '<br>');

  // スクロール
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// =====================================================================
